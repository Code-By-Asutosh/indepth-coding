<div class="overflow-hidden rounded-xl glass-panel">
  <div class="flex items-center justify-between border-b border-[var(--color-border)] bg-[var(--color-surface-alt)] px-4 py-2">
    <div class="flex items-center gap-2">
      <span class="font-mono text-xs font-semibold uppercase tracking-wide text-[var(--color-text-muted)]">{{ language() }}</span>
      @if (label()) {
        <span
          class="rounded-full px-2 py-0.5 text-[10px] font-bold uppercase tracking-wide"
          [class]="labelTone() === 'bad'
            ? 'bg-red-500/15 text-red-400'
            : labelTone() === 'good'
              ? 'bg-[var(--color-brand-500)]/15 text-[var(--color-brand-300)]'
              : 'bg-[var(--color-surface)] text-[var(--color-text-muted)]'"
        >
          {{ label() }}
        </span>
      }
    </div>
    <button
      type="button"
      (click)="copy()"
      class="text-xs font-semibold text-[var(--color-text-muted)] transition hover:text-[var(--color-brand-300)]"
    >
      {{ copied() ? '✓ Copied' : 'Copy' }}
    </button>
  </div>
  <pre class="!m-0 overflow-x-auto !bg-transparent p-4 text-sm leading-relaxed"><code #codeEl [class]="'language-' + language()">{{ code() }}</code></pre>
</div>
