<header class="sticky top-0 z-40 border-b border-[var(--color-border)] bg-[var(--color-bg)]/60 backdrop-blur-xl backdrop-saturate-150">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-3.5">
    <a routerLink="/" class="group flex items-center gap-2.5">
      <span
        class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-[var(--color-brand-400)] to-[var(--color-brand-600)] text-sm font-black text-white shadow-[0_4px_16px_-4px_rgba(99,102,241,0.55)] transition group-hover:scale-105"
      >
        &lt;/&gt;
      </span>
      <span class="text-lg font-extrabold leading-none tracking-tight text-[var(--color-text)]">
        Indepth<span class="text-[var(--color-brand-400)]">Coding</span>
      </span>
    </a>

    @if (session.hasName()) {
      <div class="flex items-center gap-3">
        <div
          class="flex h-9 w-9 items-center justify-center rounded-full bg-gradient-to-br from-[var(--color-brand-400)] to-[var(--color-brand-600)] text-sm font-bold text-white shadow-[0_2px_10px_-2px_rgba(99,102,241,0.6)]"
        >
          {{ initial() }}
        </div>
        <span class="hidden text-sm font-medium text-[var(--color-text-muted)] sm:inline">{{ session.name() }}</span>
      </div>
    }
  </div>
</header>
