<div class="mt-12 flex items-center justify-between gap-4 border-t border-[var(--color-border)] pt-6">
  @if (prev(); as p) {
    <a
      [routerLink]="p.link"
      class="group flex max-w-[45%] flex-col rounded-xl border border-[var(--color-border)] bg-[var(--color-surface)] px-4 py-3 text-left transition hover:border-[var(--color-brand-500)]"
    >
      <span class="text-xs text-[var(--color-text-muted)]">← Previous</span>
      <span class="truncate text-sm font-semibold text-[var(--color-text)] group-hover:text-[var(--color-brand-300)]">{{ p.title }}</span>
    </a>
  } @else {
    <span></span>
  }

  @if (next(); as n) {
    <a
      [routerLink]="n.link"
      class="group flex max-w-[45%] flex-col items-end rounded-xl border border-[var(--color-border)] bg-[var(--color-surface)] px-4 py-3 text-right transition hover:border-[var(--color-brand-500)]"
    >
      <span class="text-xs text-[var(--color-text-muted)]">Next →</span>
      <span class="truncate text-sm font-semibold text-[var(--color-text)] group-hover:text-[var(--color-brand-300)]">{{ n.title }}</span>
    </a>
  } @else {
    <span></span>
  }
</div>
